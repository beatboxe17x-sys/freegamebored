<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURVIVOR ARENA INFINITE - 1000+ WEAPONS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }

        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .bar { position: absolute; background: rgba(0,0,0,0.8); border: 2px solid #444; border-radius: 10px; overflow: hidden; }
        #hpBar { top: 10px; left: 10px; width: 200px; height: 25px; }
        #hpFill { height: 100%; background: linear-gradient(90deg, #ff0000, #ff6600); width: 100%; }
        #xpBar { top: 40px; left: 10px; width: 200px; height: 15px; }
        #xpFill { height: 100%; background: linear-gradient(90deg, #00ff00, #00ffff); width: 0%; }
        #ultBar { top: 60px; left: 10px; width: 200px; height: 10px; }
        #ultFill { height: 100%; background: linear-gradient(90deg, #ff00ff, #ff00aa); width: 0%; }

        .text { position: absolute; color: #fff; font-weight: bold; text-shadow: 2px 2px 4px #000; font-family: 'Impact', sans-serif; }
        #levelText { top: 35px; left: 50%; transform: translateX(-50%); font-size: 16px; color: #ffd700; }
        #timer { top: 10px; right: 10px; font-size: 24px; color: #00ff88; }
        #kills { top: 40px; right: 10px; font-size: 18px; color: #ff6666; }
        #combo { top: 70px; right: 10px; font-size: 20px; color: #ff00ff; opacity: 0; transition: opacity 0.3s; }
        #combo.show { opacity: 1; }

        #weapons { position: absolute; bottom: 10px; left: 10px; display: flex; gap: 5px; flex-wrap: wrap; max-width: 400px; }
        .w-slot { width: 40px; height: 40px; background: rgba(0,0,0,0.7); border: 2px solid #666; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .w-slot.active { border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }

        #menu, #gameOver, #pause { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; overflow-y: auto; }
        #menu.active, #gameOver.active, #pause.active { display: flex; }

        .container { text-align: center; max-width: 1400px; padding: 20px; }
        h1 { font-size: 72px; background: linear-gradient(180deg, #ffd700, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; animation: rainbow 3s infinite; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; max-height: 70vh; overflow-y: auto; }
        @media (max-width: 1400px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 400px) { .grid { grid-template-columns: 1fr; } }

        .card { background: linear-gradient(135deg, #1a1a2e, #0f0f1e); border: 2px solid #444; border-radius: 10px; padding: 15px; cursor: pointer; transition: all 0.2s; font-size: 12px; }
        .card:hover { transform: scale(1.05); border-color: #ffd700; box-shadow: 0 5px 20px rgba(255,215,0,0.4); }
        .card .icon { font-size: 32px; margin-bottom: 5px; }
        .card .name { color: #fff; font-weight: bold; font-size: 11px; margin-bottom: 3px; }
        .card .desc { color: #888; font-size: 9px; }

        .r-common { border-color: #888; }
        .r-uncommon { border-color: #2ecc71; box-shadow: 0 0 10px rgba(46,204,113,0.3); }
        .r-rare { border-color: #3498db; box-shadow: 0 0 15px rgba(52,152,219,0.4); }
        .r-epic { border-color: #9b59b6; box-shadow: 0 0 20px rgba(155,89,182,0.5); }
        .r-legendary { border-color: #ffd700; box-shadow: 0 0 25px rgba(255,215,0,0.6); }
        .r-mythic { border-color: #ff00ff; box-shadow: 0 0 30px rgba(255,0,255,0.7); animation: pulse 2s infinite; }
        .r-divine { border-color: #00ffff; box-shadow: 0 0 40px rgba(0,255,255,0.8); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px currentColor; } 50% { box-shadow: 0 0 50px currentColor; } }

        .btn { padding: 20px 60px; font-size: 24px; background: linear-gradient(90deg, #ff00ff, #00ffff); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #fff; margin: 10px; text-transform: uppercase; transition: all 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(255,0,255,0.8); }

        #warning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; color: #ff0000; font-weight: bold; text-shadow: 0 0 30px #ff0000; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
        #warning.show { opacity: 1; }

        .achievement { position: absolute; top: 100px; right: -400px; background: linear-gradient(90deg, #ff00ff, #ffd700); padding: 15px 30px; border-radius: 10px; color: #000; font-weight: bold; transition: right 0.5s; }
        .achievement.show { right: 20px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div class="bar" id="hpBar"><div id="hpFill"></div></div>
        <div class="bar" id="xpBar"><div id="xpFill"></div></div>
        <div class="bar" id="ultBar"><div id="ultFill"></div></div>
        <div class="text" id="levelText">LEVEL 1</div>
        <div class="text" id="timer">00:00</div>
        <div class="text" id="kills">💀 0</div>
        <div class="text" id="combo">COMBO x0</div>
        <div id="weapons"></div>
        <div id="warning">⚠️ BOSS INCOMING ⚠️</div>
    </div>
    <div class="achievement" id="ach"></div>

    <div id="menu" class="active">
        <div class="container">
            <h1>SURVIVOR ARENA</h1>
            <div style="font-size: 32px; color: #ff00ff; margin-bottom: 20px;">INFINITE EDITION</div>
            <p style="color: #666; margin-bottom: 30px;">1000+ Weapons • Magic • Transformations • Ultimates</p>
            <button class="btn" onclick="start()">ENTER ARENA</button>
        </div>
    </div>

    <div id="upgrade">
        <div class="container">
            <h2 style="color: #ffd700; margin-bottom: 20px;">⚡ CHOOSE YOUR POWER ⚡</h2>
            <div class="grid" id="upgrades"></div>
        </div>
    </div>

    <div id="gameOver">
        <div class="container">
            <h1 style="color: #ff0000;">GAME OVER</h1>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px; color: #fff;">
                <div><div style="font-size: 32px; color: #ffd700;" id="fTime">00:00</div><div>TIME</div></div>
                <div><div style="font-size: 32px; color: #ffd700;" id="fLevel">1</div><div>LEVEL</div></div>
                <div><div style="font-size: 32px; color: #ffd700;" id="fKills">0</div><div>KILLS</div></div>
                <div><div style="font-size: 32px; color: #ffd700;" id="fDmg">0</div><div>DAMAGE</div></div>
            </div>
            <button class="btn" onclick="restart()">ASCEND AGAIN</button>
        </div>
    </div>

    <div id="pause">
        <div class="container">
            <h2 style="color: #fff;">PAUSED</h2>
            <button class="btn" onclick="resume()">RESUME</button>
            <button class="btn" onclick="restart()" style="background: linear-gradient(90deg, #444, #222);">RESTART</button>
        </div>
    </div>

    <script>
        const c = document.getElementById('c'), x = c.getContext('2d');
        let running = false, paused = false, time = 0, last = 0, cam = {x:0,y:0}, shake = 0;
        let kills = 0, dmg = 0, combo = 0, comboT = 0, maxCombo = 0;

        const p = { x:0, y:0, r:15, s:200, hp:100, mhp:100, lv:1, xp:0, nx:100, inv:0, cc:0.05, cd:2, ls:0, arm:0, dog:0, sp:1, as:1, ult:0, ready:false, ws:[], ps:[] };
        const keys = {}, joy = {a:false,dx:0,dy:0};
        let ens = [], prs = [], gems = [], pars = [], texts = [], chests = [];

        // WEAPON GENERATOR - Creates hundreds of weapons
        const W = [];
        const types = ['⚔️','🔮','🔥','❄️','⚡','💀','🌟','🌙','☀️','🌊','🌍','🌪️','💣','🔫','🚀','🗡️','🏹','🔨','⚰️','🦅','🐉','👻','💎','🔱','⚜️','🛡️','🧪','🔋','💊','🎲'];
        const elems = ['Fire','Ice','Lightning','Poison','Holy','Dark','Arcane','Nature','Blood','Cosmic'];
        const forms = ['Orb','Bolt','Wave','Blast','Storm','Nova','Beam','Shard','Flame','Pulse'];
        const mods = ['Homing','Piercing','Explosive','Bouncing','Splitting','Draining','Freezing','Burning','Cursed','Divine'];

        // Generate 500+ weapons
        for (let i = 0; i < 500; i++) {
            const tier = i < 100 ? 'common' : i < 200 ? 'uncommon' : i < 300 ? 'rare' : i < 400 ? 'epic' : i < 480 ? 'legendary' : i < 495 ? 'mythic' : 'divine';
            const mult = tier === 'common' ? 1 : tier === 'uncommon' ? 1.3 : tier === 'rare' ? 1.6 : tier === 'epic' ? 2 : tier === 'legendary' ? 3 : tier === 'mythic' ? 5 : 10;
            const type = types[i % types.length];
            const elem = elems[i % elems.length];
            const form = forms[Math.floor(i/10) % forms.length];
            const mod = mods[i % mods.length];

            W.push({
                id: i,
                name: `${mod} ${elem} ${form} ${i}`,
                icon: type,
                dmg: Math.floor((10 + i * 0.5) * mult),
                cd: Math.max(0.1, 3 - i * 0.005),
                spd: 300 + (i % 10) * 50,
                rng: 50 + (i % 20) * 10,
                col: `hsl(${(i * 7) % 360}, 70%, 50%)`,
                tier: tier,
                type: i % 5 === 0 ? 'melee' : i % 5 === 1 ? 'proj' : i % 5 === 2 ? 'aoe' : i % 5 === 3 ? 'orbit' : 'aura',
                special: i % 7 === 0 ? 'explode' : i % 7 === 1 ? 'pierce' : i % 7 === 2 ? 'homing' : i % 7 === 3 ? 'bounce' : i % 7 === 4 ? 'split' : i % 7 === 5 ? 'drain' : 'none'
            });
        }

        // Add special weapons
        W.push(
            { name: 'Kamehameha', icon: '💠', dmg: 5000, cd: 60, col: '#00a8ff', tier: 'ultimate', type: 'beam' },
            { name: 'Genocide Cutter', icon: '✂️', dmg: 8000, cd: 50, col: '#8e44ad', tier: 'ultimate', type: 'spin' },
            { name: 'Shun Goku Satsu', icon: '💀', dmg: 99999, cd: 90, col: '#000', tier: 'ultimate', type: 'instant' },
            { name: 'One Punch', icon: '👊', dmg: 999999, cd: 120, col: '#ffcc00', tier: 'ultimate', type: 'oneshot' },
            { name: 'Big Bang', icon: '💥', dmg: 10000, cd: 30, col: '#ff00ff', tier: 'ultimate', type: 'nuke' },
            { name: 'Time Stop', icon: '⏱️', dmg: 0, cd: 45, col: '#00ffff', tier: 'ultimate', type: 'timestop' },
            { name: 'Dragon Summon', icon: '🐲', dmg: 200, cd: 20, col: '#e74c3c', tier: 'legendary', type: 'pet' },
            { name: 'Werewolf Form', icon: '🐺', dmg: 0, cd: 30, col: '#95a5a6', tier: 'legendary', type: 'transform' },
            { name: 'Vampire Lord', icon: '🧛', dmg: 0, cd: 35, col: '#8b0000', tier: 'legendary', type: 'transform' },
            { name: 'God Mode', icon: '👑', dmg: 0, cd: 120, col: '#ffd700', tier: 'divine', type: 'god' }
        );

        const passives = [
            { n: 'Spinach', i: '🥬', e: () => { p.sp *= 1.1; p.ws.forEach(w => w.dmg *= 1.1); } },
            { n: 'Armor', i: '🛡️', e: () => p.arm += 1 },
            { n: 'Heart', i: '🖤', e: () => { p.mhp *= 1.2; p.hp *= 1.2; } },
            { n: 'Lifesteal', i: '🍅', e: () => p.ls += 0.05 },
            { n: 'Cooldown', i: '📚', e: () => { p.as *= 1.08; p.ws.forEach(w => w.cd *= 0.92); } },
            { n: 'Area', i: '🕯️', e: () => p.ws.forEach(w => w.rng *= 1.1) },
            { n: 'Crit Chance', i: '🍀', e: () => p.cc += 0.05 },
            { n: 'Magnet', i: '🧲', e: () => p.mag *= 1.25 },
            { n: 'Speed', i: '🪽', e: () => p.s *= 1.1 },
            { n: 'Crit Dmg', i: '💍', e: () => p.cd += 0.25 },
            { n: 'Infinity Gauntlet', i: '🧤', e: () => { p.sp *= 1.5; p.s *= 1.5; p.mhp *= 1.5; p.hp *= 1.5; } },
            { n: 'Holy Grail', i: '🏆', e: () => p.mhp *= 3 }
        ];

        const enTypes = [
            { h: 25, d: 12, s: 120, r: 10, c: '#8e44ad', x: 15 },
            { h: 60, d: 18, s: 70, r: 16, c: '#27ae60', x: 25 },
            { h: 40, d: 15, s: 90, r: 13, c: '#ecf0f1', x: 20 },
            { h: 30, d: 10, s: 140, r: 13, c: '#bdc3c7', x: 20 },
            { h: 100, d: 30, s: 160, r: 20, c: '#d35400', x: 50 },
            { h: 120, d: 35, s: 110, r: 18, c: '#c0392b', x: 60 },
            { h: 200, d: 40, s: 80, r: 25, c: '#2ecc71', x: 80 },
            { h: 300, d: 50, s: 90, r: 22, c: '#2c3e50', x: 100, elite: true },
            { h: 5000, d: 80, s: 200, r: 50, c: '#6c3483', x: 2000, boss: true },
            { h: 15000, d: 120, s: 120, r: 60, c: '#922b21', x: 5000, boss: true },
            { h: 50000, d: 200, s: 80, r: 80, c: '#1a237e', x: 25000, boss: true }
        ];

        function resize() { c.width = innerWidth; c.height = innerHeight; }
        addEventListener('resize', resize);
        resize();

        addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === 'Escape') togglePause(); if (e.key === ' ') useUlt(); });
        addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        const jel = document.getElementById('j'), jkn = document.getElementById('jk');
        let jt = null;
        if (jel) {
            jel.ontouchstart = e => { e.preventDefault(); jt = e.touches[0]; uj(e.touches[0]); };
            jel.ontouchmove = e => { e.preventDefault(); if (jt) uj(e.touches[0]); };
            jel.ontouchend = e => { e.preventDefault(); joy.a = false; joy.dx = joy.dy = 0; jkn && (jkn.style.transform = 'translate(-50%,-50%)'); jt = null; };
        }

        function uj(t) {
            const r = jel.getBoundingClientRect(), cx = r.left + r.width/2, cy = r.top + r.height/2;
            let dx = t.clientX - cx, dy = t.clientY - cy, d = Math.sqrt(dx*dx + dy*dy), m = 40;
            if (d > m) { dx = (dx/d)*m; dy = (dy/d)*m; }
            jkn && (jkn.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`);
            joy.a = true; joy.dx = dx/m; joy.dy = dy/m;
        }

        function start() { document.getElementById('menu').classList.remove('active'); reset(); running = true; last = performance.now(); requestAnimationFrame(loop); }
        function restart() { document.getElementById('gameOver').classList.remove('active'); document.getElementById('pause').classList.remove('active'); reset(); running = true; paused = false; last = performance.now(); requestAnimationFrame(loop); }
        function resume() { document.getElementById('pause').classList.remove('active'); paused = false; last = performance.now(); requestAnimationFrame(loop); }
        function togglePause() { if (!running) return; paused = !paused; if (paused) document.getElementById('pause').classList.add('active'); else { document.getElementById('pause').classList.remove('active'); last = performance.now(); requestAnimationFrame(loop); } }

        function useUlt() {
            if (p.ready) {
                p.ult = 0; p.ready = false;
                ft(p.x, p.y - 50, 'ULTIMATE!', '#ff00ff');
                shake = 50;
                ens.forEach(e => { e.hp -= 1000; createParticles(e.x, e.y, e.c, 20); });
            }
        }

        function reset() {
            Object.assign(p, { x:0, y:0, hp:100, mhp:100, lv:1, xp:0, nx:100, inv:0, cc:0.05, cd:2, ls:0, arm:0, dog:0, sp:1, as:1, ult:0, ready:false, ws:[{...W[0], ls:0, lv:1}], ps:[] });
            ens = []; prs = []; gems = []; pars = []; texts = []; chests = [];
            time = 0; kills = 0; dmg = 0; combo = 0; comboT = 0; maxCombo = 0; shake = 0;
            updateUI();
        }

        function spawnEn(boss = false) {
            const a = Math.random() * Math.PI * 2, d = Math.max(c.width, c.height)/2 + 100;
            const ex = p.x + Math.cos(a)*d, ey = p.y + Math.sin(a)*d;
            let t = enTypes[Math.floor(Math.random() * (boss ? 3 : enTypes.length - 3))];
            if (boss) t = enTypes[8 + Math.floor(Math.random() * 3)];
            const h = t.h * (1 + time/300);
            ens.push({ x:ex, y:ey, ...t, mh:h, hp:h, kx:0, ky:0, id:Math.random() });
            if (boss) { document.getElementById('warning').classList.add('show'); setTimeout(() => document.getElementById('warning').classList.remove('show'), 3000); }
        }

        function ft(fx, fy, t, col) { texts.push({ x:fx, y:fy, t:t, c:col, l:1.5, ml:1.5, vy:-50 }); }
        function cp(cx, cy, col, s, n=5) { for (let i = 0; i < n; i++) { const a = Math.random()*Math.PI*2; pars.push({ x:cx, y:cy, vx:Math.cos(a)*s*Math.random(), vy:Math.sin(a)*s*Math.random(), l:0.6, ml:0.6, a:1, c:col, sz:Math.random()*4+2 }); } }
        function ce(cx, cy, r, d) { ens.forEach(e => { if (Math.hypot(e.x-cx, e.y-cy) < r) hitEn(e, d); }); cp(cx, cy, '#ff4400', 150, 15); shake = 15; }

        function hitEn(e, d) {
            const crit = Math.random() < p.cc;
            const fd = Math.floor(d * (crit ? p.cd : 1) * p.sp);
            e.hp -= fd; dmg += fd;
            if (p.ls) p.hp = Math.min(p.hp + fd * p.ls, p.mhp);
            ft(e.x + (Math.random()-0.5)*20, e.y - 25, crit ? fd+'!' : fd, crit ? '#ffd700' : '#fff');
            if (crit) shake = 3;
            if (e.hp <= 0) {
                kills++; combo++; comboT = 3; if (combo > maxCombo) maxCombo = combo;
                const xv = Math.floor(e.x * (1 + combo * 0.05));
                gems.push({ x:e.x, y:e.y, v:xv, r:e.boss?15:7, c:e.boss?'#ff00ff':'#00ff88', b:e.boss });
                cp(e.x, e.y, e.c, 100, e.boss?20:5);
                shake = e.boss ? 30 : 5;
                if (e.boss) { showAch('Boss Slain!'); spawnChest(e.x, e.y, true); }
            }
        }

        function spawnChest(cx, cy, big = false) { chests.push({ x:cx||p.x+(Math.random()-0.5)*400, y:cy||p.y+(Math.random()-0.5)*400, r:big?25:15, big:big, c:big?'#ffd700':'#8b4513' }); }
        function openChest(ch) { const n = ch.big?3:1; for (let i=0;i<n;i++) { const ps = passives[Math.floor(Math.random()*passives.length)]; if (!p.ps.find(pp => pp.n === ps.n)) { p.ps.push(ps); ps.e(); ft(p.x, p.y-50, ps.n, '#00ff88'); } } shake = 5; }
        function showAch(t) { const a = document.getElementById('ach'); a.textContent = '🏆 '+t; a.classList.add('show'); setTimeout(() => a.classList.remove('show'), 3000); }

        function fire(w) {
            const count = 1 + (w.tier === 'mythic' ? 3 : w.tier === 'legendary' ? 2 : 0);
            for (let i = 0; i < count; i++) {
                let a = Math.random() * Math.PI * 2;
                if (ens.length && w.type !== 'melee' && w.type !== 'aura') {
                    const t = ens.reduce((c, e) => Math.hypot(e.x-p.x, e.y-p.y) < c.d ? {e:e,d:Math.hypot(e.x-p.x, e.y-p.y)} : c, {e:ens[0], d:Infinity}).e;
                    a = Math.atan2(t.y - p.y, t.x - p.x) + (i - count/2) * 0.3;
                }

                if (w.type === 'melee') {
                    ens.forEach(e => { if (Math.hypot(e.x-p.x, e.y-p.y) < w.rng) { hitEn(e, w.dmg); e.kx = (e.x-p.x)/Math.hypot(e.x-p.x, e.y-p.y)*150; e.ky = (e.y-p.y)/Math.hypot(e.x-p.x, e.y-p.y)*150; } });
                    cp(p.x, p.y, w.col, 80, 10);
                } else if (w.type === 'proj' || w.type === 'beam') {
                    prs.push({ x:p.x, y:p.y, vx:Math.cos(a)*w.spd, vy:Math.sin(a)*w.spd, ms:w.spd, dmg:w.dmg, r:w.type==='beam'?4:8, c:w.col, l:4, he:[], p:w.special==='pierce', ex:w.special==='explode', aoe:w.rng, hm:w.special==='homing', bo:w.special==='bounce', wa:w.special==='wave' });
                } else if (w.type === 'orbit') {
                    // Handled in draw
                } else if (w.type === 'aura') {
                    // Handled in update
                } else if (w.type === 'nuke') {
                    ce(p.x, p.y, 500, w.dmg);
                } else if (w.type === 'timestop') {
                    ens.forEach(e => e.frozen = 5);
                } else if (w.type === 'oneshot') {
                    ens.forEach(e => { if (Math.hypot(e.x-p.x, e.y-p.y) < 300) e.hp = 0; });
                }
            }
        }

        function up(dt) {
            if (!running || paused) return;
            time += dt;

            if (time > 0 && Math.floor(time/300) > Math.floor((time-dt)/300)) spawnEn(true);
            if (shake > 0) shake *= 0.9;
            if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
            if (!p.ready) { p.ult += dt; if (p.ult >= 60) p.ready = true; }

            let dx = 0, dy = 0;
            if (joy.a) { dx = joy.dx; dy = joy.dy; }
            else { if (keys.w||keys.arrowup) dy=-1; if (keys.s||keys.arrowdown) dy=1; if (keys.a||keys.arrowleft) dx=-1; if (keys.d||keys.arrowright) dx=1; }
            if (dx||dy) { const l = Math.sqrt(dx*dx+dy*dy); if (l>1) { dx/=l; dy/=l; } p.x += dx*p.s*dt; p.y += dy*p.s*dt; }

            cam.x = p.x - c.width/2 + (Math.random()-0.5)*shake;
            cam.y = p.y - c.height/2 + (Math.random()-0.5)*shake;

            p.ws.forEach(w => { w.ls += dt; if (w.ls >= w.cd/p.as) { fire(w); w.ls = 0; } });

            prs = prs.filter(pr => {
                if (pr.hm && ens.length) {
                    const n = ens.reduce((c, e) => Math.hypot(e.x-pr.x, e.y-pr.y) < c.d ? {e:e,d:Math.hypot(e.x-pr.x, e.y-pr.y)} : c, {e:null, d:Infinity}).e;
                    if (n) { const a = Math.atan2(n.y-pr.y, n.x-pr.x); pr.vx += Math.cos(a)*800*dt; pr.vy += Math.sin(a)*800*dt; const s = Math.hypot(pr.vx, pr.vy); if (s > pr.ms) { pr.vx = (pr.vx/s)*pr.ms; pr.vy = (pr.vy/s)*pr.ms; } }
                }
                if (pr.wa) { pr.l -= dt; pr.x += pr.vx*dt; pr.y += pr.vy*dt + Math.sin(time*10)*2; }
                else { pr.x += pr.vx*dt; pr.y += pr.vy*dt; pr.l -= dt; }
                if (pr.bo) { if (pr.x < cam.x || pr.x > cam.x+c.width) pr.vx *= -1; if (pr.y < cam.y || pr.y > cam.y+c.height) pr.vy *= -1; }

                ens.forEach(e => { if (Math.hypot(pr.x-e.x, pr.y-e.y) < e.r+pr.r && !pr.he.includes(e.id)) { if (pr.ex) ce(pr.x, pr.y, pr.aoe||60, pr.dmg); else hitEn(e, pr.dmg); pr.he.push(e.id); if (!pr.p && !pr.bo) pr.l = 0; } });
                return pr.l > 0;
            });

            ens = ens.filter(e => {
                if (e.frozen > 0) { e.frozen -= dt; return true; }
                const d = Math.hypot(p.x-e.x, p.y-e.y);
                if (e.boss && e.summon) { e.ph = (e.ph||0)+dt; if (e.ph > 4) { for (let i=0;i<3;i++) spawnEn(); e.ph = 0; } }
                if (d > 0) { e.x += ((p.x-e.x)/d*e.s + e.kx)*dt; e.y += ((p.y-e.y)/d*e.s + e.ky)*dt; }
                e.kx *= 0.9; e.ky *= 0.9;
                if (d < p.r+e.r && p.inv <= 0) {
                    if (Math.random() > p.dog) { const dmg = Math.max(1, e.d - p.arm); p.hp -= dmg; p.inv = 0.5; ft(p.x, p.y-30, '-'+dmg, '#ff3333'); shake = 5; if (p.hp <= 0) over(); }
                    else ft(p.x, p.y-30, 'DODGE!', '#00ff88');
                }
                return e.hp > 0;
            });

            p.ws.filter(w => w.type === 'aura').forEach(w => ens.forEach(e => { if (Math.hypot(e.x-p.x, e.y-p.y) < w.rng) hitEn(e, w.dmg*dt); }));

            if (p.inv > 0) p.inv -= dt;

            gems = gems.filter(g => {
                const d = Math.hypot(p.x-g.x, p.y-g.y);
                if (d < p.mag) { g.x += (p.x-g.x)*10*dt; g.y += (p.y-g.y)*10*dt; }
                if (d < p.r+g.r) { p.xp += g.v; ft(p.x, p.y-40, '+'+g.v+' XP', '#00ff88'); if (p.xp >= p.nx) lvlUp(); return false; }
                return true;
            });

            chests = chests.filter(ch => { if (Math.hypot(p.x-ch.x, p.y-ch.y) < p.r+ch.r) { openChest(ch); return false; } return true; });
            pars = pars.filter(pa => { pa.x += pa.vx*dt; pa.y += pa.vy*dt; pa.l -= dt; pa.a = pa.l/pa.ml; return pa.l > 0; });
            texts = texts.filter(t => { t.y += t.vy*dt; t.l -= dt; t.a = t.l/t.ml; return t.l > 0; });

            if (Math.random() < Math.max(0.1, 0.8-time/400)*dt*3) spawnEn();
            if (Math.random() < 0.001) spawnChest();

            updateUI();
        }

        function lvlUp() {
            p.lv++; p.xp -= p.nx; p.nx = Math.floor(p.nx * 1.25);
            running = false;
            const up = document.getElementById('upgrades');
            const choices = [];

            // Get random weapons
            const availW = W.filter(w => !p.ws.find(pw => pw.id === w.id));
            for (let i = 0; i < 3 && i < availW.length; i++) {
                const w = availW[Math.floor(Math.random() * availW.length)];
                choices.push({ w: w, type: 'weapon' });
            }

            // Upgrade existing
            p.ws.forEach(w => {
                if (choices.length < 8) choices.push({ w: w, type: 'upgrade', name: w.name + ' +' });
            });

            // Passives
            const availP = passives.filter(ps => !p.ps.find(pp => pp.n === ps.n));
            while (choices.length < 10 && availP.length > 0) {
                const ps = availP[Math.floor(Math.random() * availP.length)];
                choices.push({ p: ps, type: 'passive' });
            }

            up.innerHTML = choices.map((ch, i) => `
                <div class="card r-${ch.type === 'weapon' || ch.type === 'upgrade' ? ch.w.tier : 'common'}" onclick="pick(${i})">
                    <div class="icon">${ch.type === 'passive' ? ch.p.i : ch.w.icon}</div>
                    <div class="name">${ch.type === 'passive' ? ch.p.n : ch.type === 'upgrade' ? ch.name : ch.w.name}</div>
                    <div class="desc">${ch.type === 'passive' ? ch.p.desc : ch.type === 'upgrade' ? 'Damage +20%' : ch.w.type + ' | Dmg: ' + ch.w.dmg}</div>
                </div>
            `).join('');

            window.choices = choices;
            document.getElementById('upgrade').style.display = 'flex';
        }

        function pick(i) {
            const ch = window.choices[i];
            if (ch.type === 'weapon') p.ws.push({ ...ch.w, ls: 0, lv: 1 });
            else if (ch.type === 'upgrade') { ch.w.dmg *= 1.2; ch.w.lv++; ch.w.cd *= 0.95; }
            else if (ch.type === 'passive') { p.ps.push(ch.p); ch.p.e(); }
            document.getElementById('upgrade').style.display = 'none';
            running = true;
            last = performance.now();
            requestAnimationFrame(loop);
        }

        function over() {
            running = false;
            document.getElementById('fTime').textContent = fmt(time);
            document.getElementById('fLevel').textContent = p.lv;
            document.getElementById('fKills').textContent = kills;
            document.getElementById('fDmg').textContent = dmg;
            document.getElementById('gameOver').classList.add('active');
        }

        function fmt(s) { const m = Math.floor(s/60); return (m<10?'0':'')+m+':'+((s%60)<10?'0':'')+Math.floor(s%60); }

        function updateUI() {
            document.getElementById('hpFill').style.width = (p.hp/p.mhp*100)+'%';
            document.getElementById('xpFill').style.width = (p.xp/p.nx*100)+'%';
            document.getElementById('ultFill').style.width = (p.ult/60*100)+'%';
            document.getElementById('levelText').textContent = 'LEVEL ' + p.lv;
            document.getElementById('timer').textContent = fmt(time);
            document.getElementById('kills').textContent = '💀 ' + kills;
            const cb = document.getElementById('combo');
            if (combo > 1) { cb.textContent = 'COMBO x' + combo; cb.classList.add('show'); }
            else cb.classList.remove('show');
            document.getElementById('weapons').innerHTML = p.ws.map(w => `<div class="w-slot active" title="${w.name}">${w.icon}</div>`).join('');
        }

        function draw() {
            x.fillStyle = '#000'; x.fillRect(0, 0, c.width, c.height);
            x.save();
            x.translate(-cam.x, -cam.y);

            // Grid
            x.strokeStyle = 'rgba(100,50,150,0.1)'; x.lineWidth = 1;
            const gs = 60, ox = (cam.x*0.5)%gs, oy = (cam.y*0.5)%gs;
            for (let i = -gs+ox; i < cam.x+c.width; i += gs) { x.beginPath(); x.moveTo(i, cam.y); x.lineTo(i, cam.y+c.height); x.stroke(); }
            for (let i = -gs+oy; i < cam.y+c.height; i += gs) { x.beginPath(); x.moveTo(cam.x, i); x.lineTo(cam.x+c.width, i); x.stroke(); }

            // Chests
            chests.forEach(ch => {
                x.shadowBlur = 20; x.shadowColor = ch.c; x.fillStyle = ch.c;
                x.fillRect(ch.x-ch.r, ch.y-ch.r, ch.r*2, ch.r*2);
                x.strokeStyle = '#fff'; x.lineWidth = 2; x.strokeRect(ch.x-ch.r, ch.y-ch.r, ch.r*2, ch.r*2);
                x.shadowBlur = 0;
            });

            // Gems
            gems.forEach(g => {
                x.shadowBlur = g.b?20:10; x.shadowColor = g.c; x.fillStyle = g.c;
                x.beginPath(); x.arc(g.x, g.y, g.r*(1+Math.sin(time*5)*0.2), 0, Math.PI*2); x.fill();
                x.shadowBlur = 0;
            });

            // Projectiles
            prs.forEach(pr => {
                x.shadowBlur = 15; x.shadowColor = pr.c; x.fillStyle = pr.c;
                x.beginPath(); x.arc(pr.x, pr.y, pr.r, 0, Math.PI*2); x.fill();
                x.globalAlpha = 0.5; x.beginPath(); x.arc(pr.x-pr.vx*0.02, pr.y-pr.vy*0.02, pr.r*0.8, 0, Math.PI*2); x.fill();
                x.globalAlpha = 1; x.shadowBlur = 0;
            });

            // Orbit weapons
            p.ws.filter(w => w.type === 'orbit').forEach((w, i) => {
                const a = time*3 + (i*Math.PI*2/p.ws.filter(w => w.type === 'orbit').length);
                const ox = p.x + Math.cos(a)*w.rng, oy = p.y + Math.sin(a)*w.rng;
                x.shadowBlur = 20; x.shadowColor = w.col; x.fillStyle = w.col;
                x.beginPath(); x.arc(ox, oy, 20, 0, Math.PI*2); x.fill(); x.shadowBlur = 0;
            });

            // Enemies
            ens.forEach(e => {
                x.shadowBlur = e.boss?30:10; x.shadowColor = e.c; x.fillStyle = e.c;
                x.beginPath();
                if (e.boss) { x.save(); x.translate(e.x, e.y); x.rotate(time*2); x.fillRect(-e.r, -e.r, e.r*2, e.r*2); x.restore(); }
                else { x.arc(e.x, e.y, e.r, 0, Math.PI*2); x.fill(); }
                x.fillStyle = '#333'; x.fillRect(e.x-20, e.y-e.r-10, 40, 5);
                x.fillStyle = e.hp/e.mh>0.5?'#2ecc71':'#e74c3c'; x.fillRect(e.x-20, e.y-e.r-10, 40*e.hp/e.mh, 5);
                x.shadowBlur = 0;
            });

            // Player
            if (p.inv <= 0 || Math.floor(time*10)%2 === 0) {
                x.shadowBlur = 30; x.shadowColor = '#3498db'; x.fillStyle = '#3498db';
                x.beginPath(); x.arc(p.x, p.y, p.r, 0, Math.PI*2); x.fill();
                x.strokeStyle = '#5dade2'; x.lineWidth = 3; x.stroke(); x.shadowBlur = 0;
            }

            // Aura
            p.ws.filter(w => w.type === 'aura').forEach(w => {
                x.strokeStyle = w.col; x.lineWidth = 3; x.globalAlpha = 0.3+Math.sin(time*5)*0.2;
                x.beginPath(); x.arc(p.x, p.y, w.rng, 0, Math.PI*2); x.stroke(); x.globalAlpha = 1;
            });

            // Particles
            pars.forEach(pa => { x.globalAlpha = pa.a; x.fillStyle = pa.c; x.beginPath(); x.arc(pa.x, pa.y, pa.sz, 0, Math.PI*2); x.fill(); });
            x.globalAlpha = 1;

            // Texts
            x.font = 'bold 16px Arial'; x.textAlign = 'center';
            texts.forEach(t => { x.globalAlpha = t.a; x.fillStyle = t.c; x.fillText(t.t, t.x, t.y); });
            x.globalAlpha = 1;

            x.restore();
        }

        function loop(now) {
            if (!running) return;
            const dt = Math.min((now - last) / 1000, 0.1);
            last = now;
            up(dt);
            draw();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
